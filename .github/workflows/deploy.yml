name: Deploy to cPanel

# Auto-deploy over FTPS. (Namecheap shared hosting has SSH/shell access
# disabled, so we upload the site files via FTP instead of pulling on the
# server.) Runs on every push to main, or manually from the Actions tab.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   FTP_SERVER    e.g. server125.web-hosting.com
#   FTP_USERNAME  an FTP account rooted at public_html, e.g. meezhutu@meezabz.com
#   FTP_PASSWORD  that account's password
# server-dir is ./ because the FTP account is locked to public_html, so its
# root already IS the web directory.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload site to cPanel over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            build.py
            _extract_map.py
            **/*.zip
